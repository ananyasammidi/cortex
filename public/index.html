<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cortex Code — Agent Skill Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --bg2: #111827;
      --bg3: #1a2236;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0f4ff;
      --text2: #8b95b0;
      --text3: #4a5568;
      --blue: #3b82f6;
      --blue-light: #93c5fd;
      --blue-dim: rgba(59,130,246,0.12);
      --teal: #14b8a6;
      --teal-dim: rgba(20,184,166,0.12);
      --amber: #f59e0b;
      --amber-dim: rgba(245,158,11,0.12);
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.1);
      --radius: 10px;
      --radius-lg: 14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* Nav */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 56px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: rgba(10,14,26,0.9);
      backdrop-filter: blur(12px); z-index: 10;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; }
    .nav-logo-icon {
      width: 28px; height: 28px; background: var(--blue);
      border-radius: 7px; display: flex; align-items: center; justify-content: center;
    }
    .nav-logo-icon svg { width: 16px; height: 16px; }
    .nav-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .nav-sub { font-size: 12px; color: var(--text2); margin-left: 4px; }
    .nav-badge {
      font-size: 11px; padding: 3px 8px; border-radius: 20px;
      background: var(--blue-dim); color: var(--blue-light);
      border: 1px solid rgba(59,130,246,0.25); font-weight: 500;
    }

    /* Layout */
    .main { max-width: 900px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }

    .hero { margin-bottom: 2.5rem; }
    .hero h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 8px; }
    .hero h1 span { color: var(--blue); }
    .hero p { font-size: 15px; color: var(--text2); max-width: 520px; }

    /* Presets */
    .section-label {
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text3); margin-bottom: 10px;
    }
    .presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .preset-btn {
      font-size: 12px; font-family: 'DM Sans', sans-serif;
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--bg2); color: var(--text2);
      cursor: pointer; transition: all 0.15s;
    }
    .preset-btn:hover { border-color: var(--blue); color: var(--text); }
    .preset-btn.active { background: var(--blue-dim); color: var(--blue-light); border-color: rgba(59,130,246,0.4); }

    /* Input area */
    .input-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 2rem;
    }
    textarea {
      width: 100%; min-height: 100px; padding: 1rem 1.25rem;
      font-size: 14px; font-family: 'DM Sans', sans-serif;
      background: transparent; color: var(--text);
      border: none; outline: none; resize: none; line-height: 1.7;
    }
    textarea::placeholder { color: var(--text3); }
    .input-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 1.25rem; border-top: 1px solid var(--border);
    }
    .char-count { font-size: 12px; color: var(--text3); }
    .generate-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 18px; font-size: 13px; font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      background: var(--blue); color: white;
      border: none; border-radius: 8px; cursor: pointer; transition: all 0.15s;
    }
    .generate-btn:hover { background: #2563eb; }
    .generate-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Output */
    .output { animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .skill-header {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1rem;
    }
    .skill-name-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .skill-display-name { font-size: 18px; font-weight: 600; }
    .skill-slug {
      font-family: 'DM Mono', monospace; font-size: 12px;
      color: var(--blue-light); background: var(--blue-dim);
      padding: 3px 9px; border-radius: 6px;
    }
    .skill-desc { font-size: 14px; color: var(--text2); line-height: 1.6; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }

    .field-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.1rem 1.25rem;
    }
    .field-card.full { grid-column: 1 / -1; }
    .field-title {
      font-size: 11px; font-weight: 500; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--text3); margin-bottom: 10px;
    }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid; }
    .tag-blue { background: var(--blue-dim); color: var(--blue-light); border-color: rgba(59,130,246,0.3); }
    .tag-teal { background: var(--teal-dim); color: #5eead4; border-color: rgba(20,184,166,0.3); }
    .tag-amber { background: var(--amber-dim); color: #fcd34d; border-color: rgba(245,158,11,0.3); }
    .tag-gray { background: var(--bg3); color: var(--text2); border-color: var(--border2); }

    .param-table { width: 100%; border-collapse: collapse; }
    .param-table tr { border-bottom: 1px solid var(--border); }
    .param-table tr:last-child { border-bottom: none; }
    .param-table td { padding: 8px 4px; font-size: 13px; vertical-align: top; }
    .param-name { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text); white-space: nowrap; }
    .param-type-badge {
      font-size: 11px; font-family: 'DM Mono', monospace;
      background: var(--blue-dim); color: var(--blue-light);
      padding: 2px 7px; border-radius: 5px; white-space: nowrap;
    }
    .param-desc { color: var(--text2); padding-left: 8px; }

    .example-list { display: flex; flex-direction: column; gap: 8px; }
    .example-item {
      font-size: 13px; color: var(--text2);
      padding: 9px 12px;
      background: var(--bg3); border-radius: 8px;
      border-left: 2px solid var(--blue);
      line-height: 1.5;
    }
    .example-item::before { content: '"'; color: var(--blue); margin-right: 2px; }
    .example-item::after { content: '"'; color: var(--blue); margin-left: 2px; }

    .eval-list { display: flex; flex-direction: column; gap: 8px; }
    .eval-item { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--text2); }
    .eval-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; margin-top: 5px; }

    .json-toggle-btn {
      width: 100%; text-align: left;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 12px 1.25rem;
      color: var(--text2); font-size: 13px; font-family: 'DM Sans', sans-serif;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: border-color 0.15s; margin-top: 1rem;
    }
    .json-toggle-btn:hover { border-color: var(--border2); color: var(--text); }
    .json-block {
      display: none; margin-top: 8px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.25rem;
    }
    .json-block pre {
      font-family: 'DM Mono', monospace; font-size: 12px;
      color: var(--text2); overflow-x: auto;
      white-space: pre-wrap; line-height: 1.7;
    }

    .error-msg {
      padding: 1rem 1.25rem; background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25); border-radius: var(--radius);
      color: #fca5a5; font-size: 14px;
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="nav-logo-icon">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 8h10M8 3l5 5-5 5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="nav-title">Cortex Code</span>
    <span class="nav-sub">/ Agent Skill Designer</span>
  </div>
  <span class="nav-badge">Powered by Claude</span>
</nav>

<main class="main">
  <div class="hero">
    <h1>Design an <span>Agent Skill</span><br/>from a workflow description</h1>
    <p>Describe what you want a Cortex Code agent to do in plain English. Get back a structured skill spec, ready to implement.</p>
  </div>

  <p class="section-label">Example workflows</p>
  <div class="presets">
    <button class="preset-btn" onclick="usePreset(this, 'Monitor my dbt pipeline and alert me when a model fails or takes longer than 10 minutes')">dbt pipeline monitor</button>
    <button class="preset-btn" onclick="usePreset(this, 'Automatically detect data quality issues in a Snowflake table and generate a summary report with affected rows')">data quality checker</button>
    <button class="preset-btn" onclick="usePreset(this, 'Help a data engineer write and optimize SQL queries for Snowflake, suggesting indexes, clustering keys, and cost-saving rewrites')">SQL optimizer</button>
    <button class="preset-btn" onclick="usePreset(this, 'Orchestrate an Airflow DAG to run ETL jobs on a schedule and notify the team on Slack if any task fails')">Airflow ETL orchestrator</button>
    <button class="preset-btn" onclick="usePreset(this, 'Scan a Snowflake schema and automatically tag columns with PII classifications like email, SSN, and phone number for governance')">PII classifier</button>
  </div>

  <div class="input-card">
    <textarea id="workflow-input" placeholder="Describe a data workflow in plain English..." oninput="updateCount()"></textarea>
    <div class="input-footer">
      <span class="char-count" id="char-count">0 characters</span>
      <button class="generate-btn" id="gen-btn" onclick="generate()">
        <span id="btn-label">Generate skill spec</span>
      </button>
    </div>
  </div>

  <div id="output"></div>
</main>

<script>
  function updateCount() {
    const n = document.getElementById('workflow-input').value.length;
    document.getElementById('char-count').textContent = n + ' character' + (n !== 1 ? 's' : '');
  }

  function usePreset(btn, text) {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('workflow-input').value = text;
    updateCount();
  }

  async function generate() {
    const input = document.getElementById('workflow-input').value.trim();
    if (!input) return;

    const btn = document.getElementById('gen-btn');
    const label = document.getElementById('btn-label');
    btn.disabled = true;
    label.innerHTML = '<span class="spinner"></span> Generating...';

    const out = document.getElementById('output');
    out.innerHTML = '';

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ workflow: input })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      renderSpec(data.spec, data.raw);
    } catch (e) {
      out.innerHTML = `<div class="error-msg">Something went wrong: ${e.message}. Please try again.</div>`;
    }

    btn.disabled = false;
    label.textContent = 'Generate skill spec';
  }

  function renderSpec(s, rawJson) {
    const out = document.getElementById('output');

    const tools = (s.tools || []).map(t =>
      `<span class="tag tag-blue" title="${t.description}">${t.name}</span>`).join('');
    const triggers = (s.trigger_conditions || []).map(t =>
      `<span class="tag tag-gray">${t}</span>`).join('');
    const outputs = (s.outputs || []).map(o =>
      `<span class="tag tag-teal">${o}</span>`).join('');
    const behaviors = (s.behaviors || []).map(b =>
      `<span class="tag tag-amber">${b}</span>`).join('');
    const params = (s.parameters || []).map(p => `
      <tr>
        <td><span class="param-name">${p.name}</span></td>
        <td><span class="param-type-badge">${p.type}</span></td>
        <td class="param-desc">${p.description}</td>
      </tr>`).join('');
    const examples = (s.example_prompts || []).map(e =>
      `<div class="example-item">${e}</div>`).join('');
    const evals = (s.evaluation_criteria || []).map(e =>
      `<div class="eval-item"><div class="eval-dot"></div><span>${e}</span></div>`).join('');

    out.className = 'output';
    out.innerHTML = `
      <div class="skill-header">
        <div class="skill-name-row">
          <span class="skill-display-name">${s.display_name || s.name}</span>
          <span class="skill-slug">${s.name}</span>
        </div>
        <div class="skill-desc">${s.description || ''}</div>
      </div>

      <div class="grid-2">
        ${tools ? `<div class="field-card">
          <div class="field-title">Tools</div>
          <div class="tag-list">${tools}</div>
        </div>` : ''}

        ${triggers ? `<div class="field-card">
          <div class="field-title">Trigger conditions</div>
          <div class="tag-list">${triggers}</div>
        </div>` : ''}

        ${params ? `<div class="field-card full">
          <div class="field-title">Parameters</div>
          <table class="param-table">${params}</table>
        </div>` : ''}

        ${behaviors ? `<div class="field-card full">
          <div class="field-title">Behaviors</div>
          <div class="tag-list">${behaviors}</div>
        </div>` : ''}

        ${outputs ? `<div class="field-card">
          <div class="field-title">Outputs</div>
          <div class="tag-list">${outputs}</div>
        </div>` : ''}

        ${evals ? `<div class="field-card">
          <div class="field-title">Evaluation criteria</div>
          <div class="eval-list">${evals}</div>
        </div>` : ''}

        ${examples ? `<div class="field-card full">
          <div class="field-title">Example prompts</div>
          <div class="example-list">${examples}</div>
        </div>` : ''}
      </div>

      <button class="json-toggle-btn" onclick="toggleJson(this)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M5 3L2 8l3 5M11 3l3 5-3 5M9 2l-2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        View raw JSON spec
      </button>
      <div class="json-block"><pre>${rawJson.replace(/</g, '&lt;')}</pre></div>
    `;

    out.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function toggleJson(btn) {
    const block = btn.nextElementSibling;
    const isOpen = block.style.display === 'block';
    block.style.display = isOpen ? 'none' : 'block';
    btn.querySelector('svg + *') || btn.childNodes;
    btn.lastChild.textContent = isOpen ? ' View raw JSON spec' : ' Hide JSON spec';
  }
</script>
</body>
</html>
